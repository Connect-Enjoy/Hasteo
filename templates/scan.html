{% extends "base.html" %}

{% block title %}Barcode Scanner - Hasteo{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/scanner.css') }}">
{% endblock %}

{% block content %}
<div class="scanner-minimal">
    <!-- Minimal Header -->
    <div class="scanner-header-minimal">
        <div class="container header-content-minimal">
            <a href="{{ url_for('index') }}" class="back-btn-minimal">
                <i class="fas fa-arrow-left"></i> Back
            </a>
            <div class="scanner-title-minimal">Barcode Scanner</div>
            <div class="header-spacer"></div>
        </div>
    </div>

    <!-- Scanner Viewport -->
    <div class="scanner-body">
        <div class="scanner-viewport">
            <video id="scannerVideo" class="scanner-video-minimal" playsinline autoplay></video>
            <div class="scanner-overlay-minimal">
                <div class="scan-frame-minimal">
                    <div class="scan-line"></div>
                </div>
            </div>
            <div class="scanner-status-minimal" id="scannerStatus">
                <i class="fas fa-video"></i> <span>Loading scanner...</span>
            </div>
        </div>

        <!-- Results Panel -->
        <div class="results-panel">
            <div class="results-header">
                <div class="results-title">
                    <i class="fas fa-barcode"></i> Scan Results
                    <div class="scan-count" id="scanCount">0</div>
                </div>
                <div class="result-time-minimal" id="lastScanTime">
                    <i class="far fa-clock"></i> Just now
                </div>
            </div>
            
            <div class="results-list" id="resultsList">
                <div class="no-results">
                    <i class="fas fa-qrcode"></i>
                    <p>Point your camera at a barcode to scan</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- Load ZXing first, then our scanner code -->
<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="{{ url_for('static', filename='js/scanner.js') }}"></script>
{% endblock %}
